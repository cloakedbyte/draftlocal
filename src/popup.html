<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Notes</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar: note list -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <span id="app-title">Notes</span>
        <button id="btn-new-note" title="New note (Ctrl+N)">&#43;</button>
      </div>
      <div id="search-wrapper">
        <input
          id="search"
          type="search"
          placeholder="Search…"
          aria-label="Search notes"
          autocomplete="off"
        />
      </div>
      <ul id="note-list" role="listbox" aria-label="Your notes"></ul>

      <!-- Sidebar footer: import / export -->
      <div id="sidebar-footer">
        <button id="btn-export" title="Export all notes as JSON">&#8593; Export</button>
        <button id="btn-import" title="Import notes from JSON">&#8595; Import</button>
        <input id="import-file" type="file" accept=".json" aria-hidden="true" tabindex="-1" />
      </div>
    </aside>

    <!-- Main: editor -->
    <main id="editor-panel">
      <div id="editor-toolbar">
        <button id="btn-delete-note" title="Delete this note" disabled>&#128465; Delete</button>
      </div>
      <div id="title-wrapper">
        <textarea
          id="note-title"
          rows="1"
          placeholder="Note title…"
          aria-label="Note title"
          disabled
        ></textarea>
        <span id="title-word-count" aria-live="polite">0 / 100</span>
      </div>
      <textarea
        id="note-body"
        placeholder="Start typing…"
        aria-label="Note body"
        disabled
      ></textarea>
      <div id="status-bar">
        <span id="save-status"></span>
      </div>
    </main>

  </div>

  <!-- Error banner (hidden by default) -->
  <div id="error-banner" role="alert" aria-live="assertive" hidden>
    <span id="error-message"></span>
    <button id="btn-dismiss-error" aria-label="Dismiss error">&#10005;</button>
  </div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
