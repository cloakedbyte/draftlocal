<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Notes</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar: note list -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <span id="app-title">Notes</span>
        <div id="header-actions">
          <button id="btn-new-note" title="New note (Ctrl+N)">&#43;</button>
          <button id="btn-theme-toggle" title="Toggle dark / light mode" aria-label="Toggle theme">&#9788;</button>
          <button id="btn-expand-toggle" title="Expand popup (Ctrl+E)" aria-label="Expand popup">&#8862;</button>
        </div>
      </div>
      <div id="search-wrapper">
        <input
          id="search"
          type="search"
          placeholder="Search…"
          aria-label="Search notes"
          autocomplete="off"
        />
      </div>
      <ul id="note-list" role="listbox" aria-label="Your notes"></ul>

      <!-- Sidebar footer: import / export -->
      <div id="sidebar-footer">
        <button id="btn-export" title="Export all notes as JSON">&#8593; Export</button>
        <button id="btn-import" title="Import notes from JSON">&#8595; Import</button>
        <input id="import-file" type="file" accept=".md" aria-hidden="true" tabindex="-1" />
      </div>
    </aside>

    <!-- Resize handle between sidebar and editor -->
    <div id="resize-handle" aria-hidden="true" title="Drag to resize sidebar"></div>

    <!-- Main: editor -->
    <main id="editor-panel">
      <!-- Empty state — shown when no note is selected and no notes exist -->
      <div id="empty-state" hidden>
        <div id="empty-state-icon">&#128221;</div>
        <p id="empty-state-msg">Press <kbd>+</kbd> to create your first note</p>
      </div>

      <div id="editor-toolbar" hidden>
        <button id="btn-delete-note" title="Delete this note" disabled>&#128465; Delete</button>
      </div>
      <div id="title-wrapper" hidden>
        <textarea
          id="note-title"
          rows="1"
          placeholder="Note title…"
          aria-label="Note title"
          disabled
        ></textarea>
        <span id="title-word-count" aria-live="polite">0 / 50</span>
      </div>
      <textarea
        id="note-body"
        placeholder="Start typing…"
        aria-label="Note body"
        disabled
        hidden
      ></textarea>
      <div id="status-bar" hidden>
        <span id="save-status"></span>
      </div>
    </main>

  </div>

  <!-- Error banner (hidden by default) -->
  <div id="error-banner" role="alert" aria-live="assertive" hidden>
    <span id="error-message"></span>
    <button id="btn-dismiss-error" aria-label="Dismiss error">&#10005;</button>
  </div>

  <!-- Quota warning banner (hidden by default) -->
  <div id="quota-banner" role="status" aria-live="polite" hidden>
    <span id="quota-message">Storage almost full</span>
    <button id="btn-dismiss-quota" aria-label="Dismiss warning">&#10005;</button>
  </div>

  <!-- Undo delete toast (hidden by default) -->
  <div id="undo-toast" role="status" aria-live="polite" hidden>
    <span id="undo-toast-msg">Note deleted</span>
    <button id="btn-undo-delete">Undo</button>
  </div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
